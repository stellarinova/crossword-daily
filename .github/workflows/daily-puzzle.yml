name: Daily Crossword Build
on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:
jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 4,
            "height": 4,
            "cells": [
              1,2,3,4,
              5,0,0,0,
              6,0,0,0,
              7,0,0,0
            ],
            "solution": [
              "C","O","D","E",
              "H","A","C","K",
              "G","A","M","E",
              "P","L","A","Y"
            ],
            "across": [
              { "num": 1, "clue": "Type of software" },
              { "num": 5, "clue": "Illegally access" },
              { "num": 6, "clue": "Form of entertainment" },
              { "num": 7, "clue": "Engage in activity" }
            ],
            "down": [
              { "num": 1, "clue": "C" },
              { "num": 2, "clue": "H" },
              { "num": 3, "clue": "G" },
              { "num": 4, "clue": "P" }
            ]
          }
          EOF
      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push