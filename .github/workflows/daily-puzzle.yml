name: Daily Crossword Build

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 4,
            "height": 4,
            "cells": [
              1,2,3,4,
              5,0,0,0,
              6,0,0,0,
              7,0,0,0
            ],
            "solution": [
              "L","A","K","E",
              "A","R","E","A",
              "K","E","Y","S",
              "E","A","S","E"
            ],
            "across": [
              { "num": 1, "clue": "Body of water" },
              { "num": 5, "clue": "Extent of surface" },
              { "num": 6, "clue": "Objects for opening locks" },
              { "num": 7, "clue": "Freedom from difficulty" }
            ],
            "down": [
              { "num": 1, "clue": "Body of water" },
              { "num": 2, "clue": "Extent of surface" },
              { "num": 3, "clue": "Objects for opening locks" },
              { "num": 4, "clue": "Freedom from difficulty" }
            ]
          }
          EOF

      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push