name: Daily Crossword Build

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 5,
            "height": 5,
            "cells": [
              1,0,0,0,0,
              null,null,null,null,null,
              2,0,0,0,0,
              null,null,null,null,null,
              3,0,0,0,0
            ],
            "solution": [
              "A","P","P","L","E",
              "","","","","",
              "B","R","A","V","E",
              "","","","","",
              "C","L","O","U","D"
            ],
            "across": [
              { "num": 1, "clue": "A fruit" },
              { "num": 2, "clue": "Courageous" },
              { "num": 3, "clue": "White sky" }
            ],
            "down": []
          }
          EOF

      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push