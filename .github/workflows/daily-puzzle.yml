name: Daily Crossword Build

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 3,
            "height": 3,
            "cells": [
              1,2,3,
              4,0,0,
              5,0,0
            ],
            "solution": [
              "C","A","T",
              "A","R","E",
              "T","E","N"
            ],
            "across": [
              { "num": 1, "clue": "A feline animal" },
              { "num": 4, "clue": "To exist or remain" },
              { "num": 5, "clue": "Number after nine" }
            ],
            "down": [
              { "num": 1, "clue": "A feline animal" },
              { "num": 2, "clue": "To exist or remain" },
              { "num": 3, "clue": "Number after nine" }
            ]
          }
          EOF

      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push