name: Daily Crossword Build
on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:
  push:
    branches: [ main ]
jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate today's puzzle
        id: gen
        run: |
          python3 - <<'EOF'
          import json
          import datetime
          import os

          # List of puzzles (each is a 4x4 word square where across and down words are the same)
          puzzles = [
            {
              "date": "2026-05-15",  # placeholder, will be replaced
              "solution": ["L","A","K","E","A","R","E","A","K","E","Y","S","E","A","S","E"],
              "across": [
                {"num": 1, "clue": "Body of water"},
                {"num": 5, "clue": "Extent of surface"},
                {"num": 6, "clue": "Objects for opening locks"},
                {"num": 7, "clue": "Freedom from difficulty"}
              ],
              "down": [
                {"num": 1, "clue": "Body of water"},
                {"num": 2, "clue": "Extent of surface"},
                {"num": 3, "clue": "Objects for opening locks"},
                {"num": 4, "clue": "Freedom from difficulty"}
              ]
            },
            {
              "date": "2026-05-15",
              "solution": ["C","O","D","E","O","P","E","N","D","E","A","R","E","N","D","S"],
              "across": [
                {"num": 1, "clue": "Cipher (4)"},
                {"num": 5, "clue": "To uncover (4)"},
                {"num": 6, "clue": "Dear (affectionate) (4)"},
                {"num": 7, "clue": "Terminates (4)"}
              ],
              "down": [
                {"num": 1, "clue": "System of symbols (4)"},
                {"num": 2, "clue": "Not closed (4)"},
                {"num": 3, "clue": "Beloved (4)"},
                {"num": 4, "clue": "Finishes (4)"}
              ]
            },
            {
              "date": "2026-05-15",
              "solution": ["B","A","L","L","A","R","E","A","L","E","A","D","L","A","D","Y"],
              "across": [
                {"num": 1, "clue": "Round object (4)"},
                {"num": 5, "clue": "Extent of surface (4)"},
                {"num": 6, "clue": "Heavy metal (4)"},
                {"num": 7, "clue": "Woman (4)"}
              ],
              "down": [
                {"num": 1, "clue": "Round object (4)"},
                {"num": 2, "clue": "Extent of surface (4)"},
                {"num": 3, "clue": "Heavy metal (4)"},
                {"num": 4, "clue": "Woman (4)"}
              ]
            },
            {
              "date": "2026-05-15",
              "solution": ["C","A","R","D","A","R","E","A","R","E","A","D","D","A","Y","S"],
              "across": [
                {"num": 1, "clue": "Play cards (4)"},
                {"num": 5, "clue": "Extent of surface (4)"},
                {"num": 6, "clue": "Peruse (4)"},
                {"num": 7, "clue": "24-hour periods (4)"}
              ],
              "down": [
                {"num": 1, "clue": "Play cards (4)"},
                {"num": 2, "clue": "Extent of surface (4)"},
                {"num": 3, "clue": "Peruse (4)"},
                {"num": 4, "clue": "24-hour periods (4)"}
              ]
            },
            {
              "date": "2026-05-15",
              "solution": ["G","A","S","P","A","R","E","A","S","E","A","L","P","E","A","R"],
              "across": [
                {"num": 1, "clue": "Gasp for air (4)"},
                {"num": 5, "clue": "Extent of surface (4)"},
                {"num": 6, "clue": "Marine mammal (4)"},
                {"num": 7, "clue": "Fruit (4)"}
              ],
              "down": [
                {"num": 1, "clue": "Gasp for air (4)"},
                {"num": 2, "clue": "Extent of surface (4)"},
                {"num": 3, "clue": "Marine mammal (4)"},
                {"num": 4, "clue": "Fruit (4)"}
              ]
            }
          ]

          # Get today's date in UTC
          today = datetime.datetime.now(datetime.timezone.utc)
          date_str = today.strftime('%Y-%m-%d')
          day_of_year = today.timetuple().tm_yday  # 1-366

          # Select puzzle based on day of year
          idx = (day_of_year - 1) % len(puzzles)
          puzzle = puzzles[idx].copy()
          puzzle["date"] = date_str

          # Cells array: 1,2,3,4,5,0,0,0,6,0,0,0,7,0,0,0 (same for all 4x4 with no blocked squares)
          puzzle["cells"] = [1,2,3,4,5,0,0,0,6,0,0,0,7,0,0,0]

          # Write to file
          with open('puzzle.json', 'w') as f:
              json.dump(puzzle, f, indent=2)

          print("Generated puzzle for", date_str)
          print("Puzzle index:", idx)
          print(json.dumps(puzzle, indent=2))
          EOF
      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          # Check if there are changes to avoid empty commit error
          if ! git diff --cached --quiet; then
            git commit -m "Update puzzle for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes in puzzle.json"
          fi