<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Daily Crossword</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <h1>Daily Crossword</h1>
  <div id="date"></div>
  <div id="grid"></div>
  <h2>Clues</h2>
  <div id="clues"></div>
  <button id="check">Check Answers</button>
  <p id="msg"></p>
  <hr>
  <h3>Submit your solution</h3>
  <p>
    Open an issue with your filled grid: 
    <a href="https://github.com/<your-username>/crossword-daily/issues/new?template=solution.md" target="_blank">
      New Solution Issue
    </a>
  </p>
  <script src="assets/script.js"></script>
</body>
</html>
