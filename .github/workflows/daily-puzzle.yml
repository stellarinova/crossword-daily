name: Daily Crossword Build
on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:
jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 4,
            "height": 4,
            "cells": [
              1,2,3,null,
              4,0,0,5,
              6,0,0,0,
              null,7,0,0
            ],
            "solution": [
              "C","A","T","",
              "A","R","E","A",
              "T","E","N","D",
              "","A","S","S"
            ],
            "across": [
              { "num": 1, "clue": "Feline pet" },
              { "num": 4, "clue": "Open expanse" },
              { "num": 6, "clue": "To stretch or tenderize" },
              { "num": 7, "clue": "Donkey" }
            ],
            "down": [
              { "num": 1, "clue": "Feline pet" },
              { "num": 2, "clue": "Open expanse" },
              { "num": 3, "clue": "Ten-dollar bills" },
              { "num": 5, "clue": "Short for advertisements" }
            ]
          }
          EOF
      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push