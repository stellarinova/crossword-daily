name: Daily Crossword Build

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 5,
            "height": 5,
            "cells": [
              1,0,2,0,3,
              0,0,0,0,0,
              4,0,5,0,6,
              0,0,0,0,0,
              7,0,8,0,9
            ],
            "solution": ["H","E","L","L","O",
                         "A","B","C","D","E",
                         "L","I","V","E","S",
                         "T","E","S","T","S",
                         "W","O","R","L","D"],
            "across": [
              {"num":1,"clue":"Greeting"},
              {"num":4,"clue":"Plural of life"},
              {"num":7,"clue":"Verb: to examine"},
              {"num":8,"clue":"Planet we live on"}
            ],
            "down": [
              {"num":1,"clue":"Chemical symbol for helium"},
              {"num":2,"clue":"To obtain"},
              {"num":3,"clue":"Opposite of win"},
              {"num":5,"clue":"Plural of box"},
              {"num":6,"clue":"Past tense of be"},
              {"num":9,"clue":"To pull"}
            ]
          }
          EOF

      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push