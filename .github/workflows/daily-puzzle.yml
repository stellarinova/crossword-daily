name: Daily Crossword Build

on:
  schedule:
    - cron: '5 0 * * *'
  workflow_dispatch:

jobs:
  build-puzzle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate today's puzzle
        id: gen
        run: |
          cat > puzzle.json <<'EOF'
          {
            "date": "${{ github.event.schedule || 'manual' }}",
            "width": 5,
            "height": 5,
            "cells": [
              1,2,3,4,5,
              6,0,0,0,0,
              7,0,0,0,0,
              8,0,0,0,0,
              9,0,0,0,0
            ],
            "solution": [
              "H","E","A","R","T",
              "E","A","G","L","E",
              "A","M","B","E","R",
              "R","E","S","I","N",
              "T","R","E","N","D"
            ],
            "across": [
              { "num": 1, "clue": "A vital organ" },
              { "num": 6, "clue": "A bird of prey" },
              { "num": 7, "clue": "Fossilized tree resin" },
              { "num": 8, "clue": "Sticky substance from trees" },
              { "num": 9, "clue": "A general direction in which something is developing" }
            ],
            "down": [
              { "num": 1, "clue": "A vital organ" },
              { "num": 2, "clue": "A bird of prey" },
              { "num": 3, "clue": "Fossilized tree resin" },
              { "num": 4, "clue": "Sticky substance from trees" },
              { "num": 5, "clue": "A general direction in which something is developing" }
            ]
          }
          EOF

      - name: Commit puzzle.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add puzzle.json
          git commit -m "Update puzzle for ${{ github.event.schedule || 'manual' }}"
          git push